<div id="dashboard-view" class="view flex-col flex-1 bg-slate-50">
    <div class="bg-white sticky top-0 z-10 shadow-sm flex flex-col pt-4">
        
        <div class="flex items-center justify-between gap-3 px-4 pb-3">
            <button onclick="window.toggleSidebar()" class="text-slate-500 hover:text-slate-800 text-xl px-1">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3 text-slate-400"></i>
                <input type="text" id="search-input" oninput="window.handleSearch()" placeholder="Search records..." class="w-full pl-11 pr-4 py-2.5 rounded-xl bg-slate-100 border-none focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800 text-sm">
            </div>
        </div>

        <div class="flex gap-2 px-4 pb-3 text-[11px] font-bold overflow-x-auto items-center no-scrollbar" id="filter-chips">
            <button id="clear-filters-btn" onclick="window.clearAllFilters()" class="hidden filter-chip px-3 py-1.5 rounded-full bg-rose-100 text-rose-700 border border-rose-200 shrink-0 shadow-sm transition active:scale-95">
                <i class="fa-solid fa-xmark"></i> Clear
            </button>
            <div class="relative flex items-center justify-center shrink-0">
                <button id="date-btn" class="filter-chip px-3 py-1.5 rounded-full bg-slate-100 text-slate-600 border border-slate-200 shadow-sm flex items-center gap-1.5 transition">
                    <i class="fa-regular fa-calendar text-blue-500"></i> <span id="date-display">Date</span>
                </button>
                <input type="date" id="date-filter-input" onchange="window.setDateFilter(this.value)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
            </div>
            <button onclick="window.setFilter('all')" class="filter-chip active px-4 py-1.5 rounded-full bg-blue-600 text-white shrink-0 shadow-sm transition" data-val="all">All</button>
            <button onclick="window.setFilter('undone')" class="filter-chip px-4 py-1.5 rounded-full bg-slate-100 text-slate-600 shrink-0 border border-slate-200 transition" data-val="undone">Pending</button>
            <button onclick="window.setFilter('done')" class="filter-chip px-4 py-1.5 rounded-full bg-slate-100 text-slate-600 shrink-0 border border-slate-200 transition" data-val="done">Done</button>
        </div>
    </div>

    <div id="tiles-container" class="p-4 space-y-4 overflow-y-auto flex-1 pb-24">
        <div id="empty-state" class="text-center py-12 px-4 text-slate-400">
            <i class="fa-solid fa-receipt text-4xl mb-2"></i>
            <p class="text-sm">No records found.</p>
        </div>
    </div>

    <input type="file" id="gallery-upload" accept="image/*" class="hidden" onchange="window.uploadAndScanImage(this)">
    <input type="file" id="camera-upload" accept="image/*" capture="environment" class="hidden" onchange="window.uploadAndScanImage(this)">
    <input type="file" id="manual-image-upload" accept="image/*" class="hidden" onchange="window.handleManualImageUpload(this)">

    <div id="fab-menu" class="fixed bottom-24 right-6 flex-col gap-3 z-20 hidden items-end">
        <button onclick="document.getElementById('gallery-upload').click(); window.toggleFabMenu(false);" class="flex items-center gap-3 bg-white px-4 py-2 rounded-full shadow-lg text-slate-700 font-bold text-sm hover:bg-slate-50">
            Gallery <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center"><i class="fa-solid fa-image"></i></div>
        </button>
        <button onclick="document.getElementById('camera-upload').click(); window.toggleFabMenu(false);" class="flex items-center gap-3 bg-white px-4 py-2 rounded-full shadow-lg text-slate-700 font-bold text-sm hover:bg-slate-50">
            Camera <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center"><i class="fa-solid fa-camera"></i></div>
        </button>
        <button onclick="window.openManualEntry();" class="flex items-center gap-3 bg-white px-4 py-2 rounded-full shadow-lg text-slate-700 font-bold text-sm hover:bg-slate-50">
            Manual <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center"><i class="fa-solid fa-pen"></i></div>
        </button>
    </div>

    <div class="fixed bottom-6 right-6 z-20">
        <button onclick="window.toggleFabMenu()" id="main-fab" class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl hover:bg-blue-700 active:scale-90 transition-transform duration-300">
            <i class="fa-solid fa-plus text-2xl transition-transform duration-300" id="fab-icon"></i>
        </button>
    </div>
</div>
