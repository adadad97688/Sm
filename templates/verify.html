<!-- ========================================== -->
<!-- MODULE: PRE-SAVE VERIFICATION VIEW         -->
<!-- ========================================== -->
<div id="verify-view" class="view flex-col flex-1 bg-white p-6 hidden">
    <div class="flex items-center justify-between border-b border-slate-200 pb-4 mb-4">
        <h2 class="text-lg font-bold text-slate-800">Verify Details</h2>
        <button onclick="window.cancelVerification()" class="text-slate-500 text-sm font-bold bg-slate-100 px-3 py-1 rounded-lg hover:bg-slate-200 transition">Cancel</button>
    </div>
    
    <!-- Actual Scanned Image -->
    <img id="verify-image" src="" class="w-full h-40 object-contain rounded-xl mb-4 border border-slate-200 shadow-sm bg-slate-50 hidden">
    
    <!-- Placeholder for Manual Mode (Clickable) -->
    <div id="verify-image-placeholder" onclick="document.getElementById('manual-image-upload').click()" class="w-full h-28 border-2 border-dashed border-slate-300 rounded-xl mb-4 flex flex-col items-center justify-center text-slate-400 cursor-pointer hover:bg-slate-50 hover:border-blue-400 hover:text-blue-500 transition hidden">
        <i class="fa-solid fa-camera text-2xl mb-2"></i>
        <span class="text-xs font-bold mt-1">Add Image (Optional)</span>
    </div>

    <div id="verify-fields-container" class="space-y-4 flex-1 overflow-y-auto pb-4">
        <!-- Inputs injected dynamically here -->
    </div>

    <div class="mt-2 space-y-3 pt-2 border-t border-slate-100">
        <button onclick="window.addVerifyField()" class="w-full border-2 border-dashed border-slate-300 hover:border-blue-500 text-slate-600 font-semibold py-2.5 rounded-xl text-sm transition flex items-center justify-center gap-2">
            <i class="fa-solid fa-plus"></i> Add Custom Field
        </button>
        <button onclick="window.saveVerifiedEntry()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl shadow-md transition text-lg flex justify-center items-center gap-2">
            <i class="fa-solid fa-cloud-arrow-up"></i> Save to Cloud
        </button>
    </div>
</div>
