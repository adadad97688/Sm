<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Repair Scanner</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 24px 16px;
        }
        h1 { font-size: 1.5rem; color: #1a202c; margin-bottom: 8px; }
        p.subtitle { color: #718096; margin-bottom: 24px; font-size: 0.95rem; }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 24px;
            width: 100%;
            max-width: 480px;
        }
        label { display: block; font-weight: 600; color: #2d3748; margin-bottom: 8px; }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            background: #f7fafc;
            cursor: pointer;
            margin-bottom: 16px;
        }
        #preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 8px;
            display: none;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2b6cb0; }
        button:disabled { background: #a0aec0; cursor: not-allowed; }
        #result {
            margin-top: 20px;
            display: none;
        }
        .result-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .result-row:last-child { border-bottom: none; }
        .result-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #718096; letter-spacing: 0.05em; }
        .result-value { font-size: 1rem; color: #2d3748; }
        .error { color: #e53e3e; margin-top: 12px; font-size: 0.9rem; }
        .loading { text-align: center; color: #718096; margin-top: 12px; }
    </style>
</head>
<body>
    <h1>Repair Ticket Scanner</h1>
    <p class="subtitle">Upload a photo of a repair slip to extract details</p>
    <div class="card">
        <label for="imageInput">Select Image</label>
        <input type="file" id="imageInput" accept="image/*">
        <img id="preview" alt="Preview">
        <button id="scanBtn" onclick="scanImage()">Scan Image</button>
        <div id="loading" class="loading" style="display:none;">Analyzing image...</div>
        <div id="result">
            <div class="result-row">
                <span class="result-label">Customer Name</span>
                <span class="result-value" id="resName">—</span>
            </div>
            <div class="result-row">
                <span class="result-label">Contact</span>
                <span class="result-value" id="resContact">—</span>
            </div>
            <div class="result-row">
                <span class="result-label">Problem</span>
                <span class="result-value" id="resProblem">—</span>
            </div>
        </div>
        <div id="error" class="error"></div>
    </div>
    <script>
        document.getElementById('imageInput').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const preview = document.getElementById('preview');
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            }
        });

        async function scanImage() {
            const input = document.getElementById('imageInput');
            const btn = document.getElementById('scanBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');

            if (!input.files[0]) {
                error.textContent = 'Please select an image first.';
                return;
            }

            btn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';
            error.textContent = '';

            const formData = new FormData();
            formData.append('image', input.files[0]);

            try {
                const res = await fetch('/scan-image', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) {
                    error.textContent = data.error;
                } else {
                    document.getElementById('resName').textContent = data.name || '—';
                    document.getElementById('resContact').textContent = data.contact || '—';
                    document.getElementById('resProblem').textContent = data.problem || '—';
                    result.style.display = 'block';
                }
            } catch (e) {
                error.textContent = 'Failed to connect to server. Please try again.';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
